{% set name = "XStatic-Bootstrap" %}
{% set version = "5.3.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') | lower }}-{{ version }}.tar.gz
  sha256: 04f5cc95bbe5438d1e851d06c4ca1ad7f84bd36a09b4de5a1f54b524e8506859

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - xstatic
    - pip
  run:
    python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - xstatic.pkg.bootstrap

about:
  home: https://xstatic.readthedocs.io/
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Twitter Bootstrap packaged for setuptools

  description: |
    Quickly design and customize responsive mobile-first sites with Bootstrap, |
    the world’s most popular front-end open source toolkit, featuring Sass variables and mixins,|
    responsive grid system, extensive prebuilt components, and powerful JavaScript plugins.
  doc_url: https://xstatic.readthedocs.io/
  dev_url: https://github.com/xstatic-py/xstatic-bootstrap

extra:
  recipe-maintainers:
    - ReimarBauer
